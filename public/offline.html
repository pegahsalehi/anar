<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFCF7" />
    <title>You're offline | Anar</title>
    <style>
      :root {
        color-scheme: light;
        --background: #fffcf7;
        --card: #ffffff;
        --foreground: #12352a;
        --muted: #51685d;
        --border: #dde4e0;
        --primary: #55dca4;
        --primary-hover: #49c995;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(85, 220, 164, 0.14), transparent 18rem),
          var(--background);
        color: var(--foreground);
        font-family:
          Manrope,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding:
          max(1.25rem, env(safe-area-inset-top))
          max(1rem, env(safe-area-inset-right))
          max(1.25rem, env(safe-area-inset-bottom))
          max(1rem, env(safe-area-inset-left));
      }

      section {
        width: min(100%, 24rem);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: rgba(255, 255, 255, 0.88);
        padding: 1.5rem;
        text-align: center;
        box-shadow: 0 18px 44px rgb(16 42 67 / 0.08);
      }

      img {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        object-fit: contain;
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(1.5rem, 8vw, 2rem);
        line-height: 1.12;
        font-weight: 600;
      }

      p {
        margin: 0.75rem auto 0;
        max-width: 18rem;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.6;
      }

      p + p {
        margin-top: 0.35rem;
        font-size: 0.85rem;
      }

      button {
        min-height: 2.75rem;
        margin-top: 1.25rem;
        border: 0;
        border-radius: 0.375rem;
        background: var(--primary);
        color: var(--foreground);
        cursor: pointer;
        font: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0.7rem 1.1rem;
        box-shadow: 0 14px 28px rgb(18 53 42 / 0.12);
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:focus-visible {
        outline: 3px solid rgba(85, 220, 164, 0.35);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <section aria-labelledby="offline-title">
        <img src="/brand/anar-icon.png" alt="Anar" />
        <h1 id="offline-title">You're offline</h1>
        <p>Reconnect to view or update your nutrition data.</p>
        <p>Pages and account data require an internet connection.</p>
        <button type="button" onclick="window.location.reload()">Try again</button>
      </section>
    </main>
  </body>
</html>
